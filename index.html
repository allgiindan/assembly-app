<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参政党議員団 議会一般質問データベース (Supabase版)</title>
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="/style.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script type="module" src="/src/main.jsx"></script>
    <script type="module" src="/config.js"></script>
    <script>
      window.APP_CONFIG = window.APP_CONFIG || {
        SUPABASE_URL: "%VITE_SUPABASE_URL%",
        SUPABASE_ANON_KEY: "%VITE_SUPABASE_ANON_KEY%"
      };
    </script>
    <style>
        body { font-family: 'Meiryo', 'ヒラギノ角ゴ Pro W3', 'Hiragino Kaku Gothic Pro', 'ＭＳ Ｐゴシック', 'MS PGothic', sans-serif; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #f1f1f1; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #ff8c00; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#fafafa]">
    <div id="root"></div>
</body>
</html>
