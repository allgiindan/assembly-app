<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参政党議員団 議会一般質問データベース (Supabase版)</title>
    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="/style.css" />
    <!-- Lucide Icons (React版) -->
    <script src="https://unpkg.com/lucide-react"></script>
    <!-- Supabase JS Library (UMD版) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script type="module" src="/config.js"></script>
    <script>
      window.APP_CONFIG = window.APP_CONFIG || {
        SUPABASE_URL: "%VITE_SUPABASE_URL%",
        SUPABASE_ANON_KEY: "%VITE_SUPABASE_ANON_KEY%"
      };
    </script>
    <style>
        body { font-family: 'Meiryo', 'ヒラギノ角ゴ Pro W3', 'Hiragino Kaku Gothic Pro', 'ＭＳ Ｐゴシック', 'MS PGothic', sans-serif; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #f1f1f1; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #ff8c00; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#fafafa]">
    <div id="root"></div>

    <script type="text/babel">
    {
        const { useState } = React;

        // --- Supabase / Lucide の安全な取得 ---
        // windowオブジェクトからライブラリを取得します
        const supabaseLib = window.supabase;
        const createClient = supabaseLib ? supabaseLib.createClient : null;

        const lucideLib = window.Lucide || window.lucide;
        const { 
            Search, PlusCircle, Database, LayoutDashboard, Calendar, User, MapPin, 
            MessageSquare, Send, Loader2, ChevronRight, Filter, Sparkles, FileText, 
            Trash2, Menu, X, ExternalLink, ShieldCheck, Newspaper, Users, BookOpen, 
            Settings, Globe, Info, Home, ArrowLeft, CheckCircle2, AlertTriangle, ScrollText
        } = lucideLib || {};

        // --- Supabase Configuration ---
        // ここにSupabaseの情報を入力してください
        const { SUPABASE_URL = "", SUPABASE_ANON_KEY = "" } = window.APP_CONFIG || {};
        
        let supabaseClient = null;
        if (createClient && SUPABASE_URL && SUPABASE_ANON_KEY) {
            supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        const App = () => {
            const [view, setView] = useState('home');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const navItems = [
                { id: 'philosophy', label: '理念', description: '参政党の理念・綱領・議員理念', icon: Info ? <Info size={20} /> : null, color: 'bg-orange-500' },
                { id: 'manual', label: '議員団マニュアル', description: '活動にあたっての指針', icon: ShieldCheck ? <ShieldCheck size={20} /> : null, color: 'bg-emerald-600' },
                { id: 'news', label: 'ニュース', description: '最新活動情報', icon: Newspaper ? <Newspaper size={20} /> : null, color: 'bg-blue-600' },
                { id: 'schedule', label: 'スケジュール', description: '直近の主要予定', icon: Calendar ? <Calendar size={20} /> : null, color: 'bg-rose-500' },
                { id: 'members', label: '議員検索', description: '所属議員プロフィール', icon: Users ? <Users size={20} /> : null, color: 'bg-indigo-600', link: 'member-search.html' },
                { id: 'policy_team', label: '政策勉強チーム', description: '分野別の研究活動', icon: BookOpen ? <BookOpen size={20} /> : null, color: 'bg-amber-600' },
                { id: 'list', label: '一般質問検索', description: '質問データの表示・分析', icon: Search ? <Search size={20} /> : null, color: 'bg-[#002a5c]', link: 'question-search.html' },
                { id: 'research', label: '調査サイト', description: '役立つ外部リンク集', icon: Globe ? <Globe size={20} /> : null, color: 'bg-teal-600' },
                { id: 'settings', label: '設定画面', description: '表示設定など', icon: Settings ? <Settings size={20} /> : null, color: 'bg-slate-600' },
                { id: 'hq_settings', label: '本部設定', description: '本部側の設定', icon: ShieldCheck ? <ShieldCheck size={20} /> : null, color: 'bg-slate-700' },
            ];

            // UI Components
            return (
                <div className="min-h-screen bg-[#fafafa]">
                    {/* --- HEADER --- */}
                    <header className="sticky top-0 z-[100] bg-white border-b border-orange-100 shadow-sm">
                        <div className="bg-[#ff8c00] h-1 w-full"></div>
                        <div className="max-w-[1400px] mx-auto px-4 lg:px-8 flex items-center justify-between h-14 md:h-16">
                            <div className="flex items-center gap-2 shrink-0 cursor-pointer" onClick={() => setView('home')}>
                                <div className="bg-[#ff8c00] p-1.5 rounded-lg text-white">
                                    {Home && <Home size={20} />}
                                </div>
                                <div>
                                    <h1 className="font-black text-base md:text-lg text-[#002a5c] leading-none">参政党議員団</h1>
                                    <p className="text-[8px] md:text-[9px] font-bold text-orange-600 mt-0.5 uppercase tracking-tighter">Portal System</p>
                                </div>
                            </div>
                            <div className="hidden lg:flex items-center gap-0.5">
                                {navItems.map((item) => (
                                    <button 
                                        key={item.id}
                                        onClick={() => { if (item.link) { window.location.href = item.link } else { setView(item.id); setIsMobileMenuOpen(false); } }}
                                        className={`px-2 py-1 rounded-md font-bold text-[10px] transition-all flex items-center gap-1 ${view === item.id ? 'bg-orange-50 text-orange-600' : 'text-slate-500 hover:bg-slate-50'}`}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="lg:hidden p-2 text-slate-500">
                                {isMobileMenuOpen ? (X && <X size={20} />) : (Menu && <Menu size={20} />)}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-[1200px] mx-auto px-4 lg:px-8 py-6 md:py-8">
                        {/* --- PORTAL HOME --- */}
                        {view === 'home' && (
                            <div className="space-y-8 animate-in">
                                <div className="text-center space-y-2">
                                    <h2 className="text-2xl md:text-3xl font-black text-[#002a5c]">議員団ポータルサイト</h2>
                                    <p className="text-slate-500 font-bold max-w-xl mx-auto text-xs">Supabaseと連携した統合プラットフォームです。</p>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4">
                                    {navItems.map((item) => (
                                        <button 
                                            key={item.id}
                                            onClick={() => item.link ? window.location.href = item.link : setView(item.id)}
                                            className="bg-white p-4 md:p-5 rounded-[1.25rem] shadow-sm border border-slate-100 hover:border-orange-200 hover:shadow-lg transition-all text-left group flex flex-col items-start gap-3 relative overflow-hidden"
                                        >
                                            <div className={`p-2.5 rounded-xl text-white ${item.color} shadow-sm group-hover:scale-105 transition-transform`}>
                                                {item.icon}
                                            </div>
                                            <div>
                                                <h3 className="text-base md:text-lg font-black text-[#002a5c] mb-0.5">
                                                    {item.label}
                                                    {['manual','news','schedule','members','policy_team','research','settings'].includes(item.id) ? ' 準備中⛏' : ''}
                                                </h3>
                                                <p className="text-[10px] md:text-[11px] text-slate-400 font-medium leading-tight">{item.description}</p>
                                            </div>
                                            <div className="mt-auto pt-1 flex items-center text-orange-600 font-black text-[9px] uppercase tracking-widest gap-0.5 group-hover:translate-x-1 transition-transform">
                                                Go {ChevronRight && <ChevronRight size={10} />}
                                            </div>
                                        </button>
                                    ))}
                                </div>
                                {!supabaseClient && (
                                    <div className="bg-red-50 p-4 rounded-xl border border-red-200 flex items-center gap-3 text-red-600 text-xs font-bold">
                                        {AlertTriangle && <AlertTriangle size={16} />}
                                        Supabaseの設定が完了していません。public/config.js または .env に SUPABASE_URL と SUPABASE_ANON_KEY を設定してください。
                                    </div>
                                )}
                            </div>
                        )}

                        {/* --- PHILOSOPHY VIEW --- */}
                        {view === 'philosophy' && (
                            <div className="max-w-4xl mx-auto space-y-6 animate-in">
                                <button onClick={() => setView('home')} className="flex items-center gap-1 text-slate-400 font-bold mb-2 text-xs">{ArrowLeft && <ArrowLeft size={14}/>} ポータルへ戻る</button>
                                <div className="text-center mb-8"><h2 className="text-3xl font-black text-[#002a5c] mb-3">参政党の理念</h2><div className="h-1.5 w-20 bg-orange-500 mx-auto rounded-full"></div></div>
                                <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-lg border-l-8 border-orange-500">
                                    <h3 className="text-lg font-black text-orange-600 mb-4 flex items-center gap-2">{Sparkles && <Sparkles size={20} />} 理念</h3>
                                    <p className="text-xl md:text-2xl font-black text-[#002a5c] leading-relaxed italic">「日本の国益を守り、世界に大調和を生む。」</p>
                                </div>
                                <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-lg border border-slate-100">
                                    <h3 className="text-lg font-black text-orange-600 mb-6 border-b pb-2 inline-block">綱領</h3>
                                    <div className="space-y-6 text-[#002a5c] font-bold">
                                        {[
                                            "先人の叡智を活かし、天皇を中心に一つにまとまる平和な国をつくる。",
                                            "日本国の自立と繁栄を追求し、人類の発展に寄与する。",
                                            "日本の精神と伝統を活かし、調和社会のモデルをつくる。"
                                        ].map((text, i) => (
                                            <div key={i} className="flex gap-4 items-start">
                                                <span className="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs shrink-0">一</span>
                                                <p className="text-base leading-loose">{text}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-[#002a5c] p-6 md:p-10 rounded-[2.5rem] shadow-2xl text-white">
                                    <h3 className="text-xl font-black text-orange-400 mb-8 flex items-center gap-2">{Users && <Users size={24} />} 参政党所属議員理念</h3>
                                    <div className="space-y-5">
                                        {[
                                            "私たちは、常に向上心を持って学び、国家国民のための仕事をする",
                                            "私たちは、いかなる利害にも左右されず、人として正しいことを貫く",
                                            "私たちは、大衆迎合せず、国民に正しい情報を提供し世論を喚起する",
                                            "私たちは、正しい知識とそれに基づく行動を議会で示す",
                                            "私たちは、参政党議員であることに誇りをもって、信頼される活動を続ける"
                                        ].map((text, i) => (
                                            <div key={i} className="flex gap-4 items-center bg-white/5 p-4 rounded-2xl border border-white/10 hover:bg-white/10 transition-colors">
                                                <span className="w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center font-black shrink-0 text-sm">{i + 1}</span>
                                                <p className="text-sm md:text-base font-medium leading-relaxed">{text}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- MANUAL VIEW --- */}
                        {view === 'manual' && (
                            <div className="max-w-5xl mx-auto space-y-6 animate-in">
                                <button onClick={() => setView('home')} className="flex items-center gap-1 text-slate-400 font-bold mb-2 text-xs">{ArrowLeft && <ArrowLeft size={14}/>} ポータルへ戻る</button>
                                <div className="flex flex-col md:flex-row gap-8">
                                    <div className="md:w-64 space-y-2 shrink-0">
                                        <div className="bg-[#002a5c] text-white p-4 rounded-t-2xl font-black text-sm">目次</div>
                                        <div className="bg-white border border-slate-100 rounded-b-2xl shadow-sm overflow-hidden text-xs">
                                            <a href="#section-1" className="block p-3 hover:bg-orange-50 border-b border-slate-50 transition-colors">第1章：活動の基本</a>
                                        </div>
                                    </div>
                                    <div className="flex-1 space-y-8">
                                        <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-orange-50">
                                            <div className="flex items-center gap-3 mb-8"><div className="p-3 bg-emerald-100 text-emerald-600 rounded-2xl">{ScrollText && <ScrollText size={24} />}</div><h2 className="text-2xl font-black text-[#002a5c]">議員団マニュアル</h2></div>
                                            <section id="section-1" className="space-y-4 mb-10">
                                                <h3 className="text-lg font-black text-orange-600 border-b-2 border-orange-100 pb-2">第1章：活動の基本</h3>
                                                <div className="space-y-3">
                                                    <div className="flex gap-3 items-start p-3 bg-slate-50 rounded-xl">
                                                        {CheckCircle2 && <CheckCircle2 className="text-emerald-500 shrink-0 mt-0.5" size={16} />}
                                                        <div><div className="font-bold text-[#002a5c] text-sm">地域住民の声を聞く</div><p className="text-[11px] text-slate-500 mt-1">住民が抱える真の課題を吸い上げてください。</p></div>
                                                    </div>
                                                </div>
                                            </section>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- HQ SETTINGS VIEW --- */}
                        {view === 'hq_settings' && (
                             <div className="max-w-2xl mx-auto space-y-6 animate-in">
                                <button onClick={() => setView('home')} className="flex items-center gap-1 text-slate-400 font-bold mb-2 text-xs">{ArrowLeft && <ArrowLeft size={14}/>} ポータルへ戻る</button>
                                <div className="bg-white p-8 rounded-[1.5rem] shadow-lg border border-slate-100">
                                    <h2 className="text-xl font-black text-[#002a5c] mb-6 flex items-center gap-2">{ShieldCheck && <ShieldCheck size={20} />} 本部設定</h2>
                                    <div className="p-4 bg-slate-50 rounded-xl text-xs font-bold text-slate-500">
                                        こちらは本部側の管理設定ページです。必要に応じて機能を追加してください。
                                    </div>
                                </div>
                             </div>
                        )}
                        
                        {/* Settings View */}
                        {view === 'settings' && (
                             <div className="max-w-2xl mx-auto space-y-6 animate-in">
                                <button onClick={() => setView('home')} className="flex items-center gap-1 text-slate-400 font-bold mb-2 text-xs">{ArrowLeft && <ArrowLeft size={14}/>} ポータルへ戻る</button>
                                <div className="bg-white p-8 rounded-[1.5rem] shadow-lg border border-slate-100">
                                    <h2 className="text-xl font-black text-[#002a5c] mb-6 flex items-center gap-2">{Settings && <Settings size={20} />} システム設定</h2>
                                    <div className="p-4 bg-slate-50 rounded-xl text-xs font-bold text-slate-500">
                                        Supabase接続ステータス: {supabaseClient ? "接続済み" : "未設定"}
                                    </div>
                                </div>
                             </div>
                        )}
                    </main>

                    {/* --- MOBILE MENU --- */}
                    {isMobileMenuOpen && (
                        <div className="lg:hidden fixed inset-0 z-[110] bg-white p-4 animate-in overflow-y-auto">
                            <div className="flex justify-between items-center mb-6">
                                <span className="font-black text-[#002a5c]">MENU</span>
                                <button onClick={() => setIsMobileMenuOpen(false)} className="p-2 bg-slate-100 rounded-full">{X && <X size={20}/>}</button>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <button onClick={() => { setView('home'); setIsMobileMenuOpen(false); }} className={`col-span-2 flex items-center gap-2 p-3 rounded-xl font-bold text-xs bg-slate-100`}>
                                    {Home && <Home size={16}/>} ポータルへ戻る
                                </button>
                                {navItems.map((item) => (
                                    <button key={item.id} onClick={() => { if (item.link) { window.location.href = item.link } else { setView(item.id); setIsMobileMenuOpen(false); } }} className={`flex items-center gap-2 p-3 rounded-xl font-bold text-xs ${view === item.id ? 'bg-orange-600 text-white' : 'bg-slate-50'}`}>
                                        {item.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    }
    </script>
</body>
</html>
