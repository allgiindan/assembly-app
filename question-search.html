<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一般質問検索 | 参政党議員団</title>
    <link rel="stylesheet" href="/Giindan_Website/style.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script type="module" src="/Giindan_Website/config.js"></script>
    <script>
      window.APP_CONFIG = window.APP_CONFIG || {
        SUPABASE_URL: "%VITE_SUPABASE_URL%",
        SUPABASE_ANON_KEY: "%VITE_SUPABASE_ANON_KEY%"
      };
    </script>
    <style>
        body { font-family: 'Meiryo', 'ヒラギノ角ゴ Pro W3', 'Hiragino Kaku Gothic Pro', 'ＭＳ Ｐゴシック', 'MS PGothic', sans-serif; background: #fafafa; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #f1f1f1; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #ff8c00; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div>
                <p class="text-xs uppercase tracking-[0.35em] text-orange-600 font-black mb-2">一般質問検索</p>
                <h1 class="text-3xl md:text-4xl font-black text-[#102a43]">一般質問データベース</h1>
                <p class="text-sm text-slate-500 mt-2">キーワードと議員名で絞り込み、検索結果をテーブルで表示します。</p>
            </div>
            <div class="flex gap-2">
                <a href="index.html" class="inline-flex items-center justify-center px-4 py-2 rounded-2xl bg-slate-900 text-white text-sm font-bold hover:bg-slate-800 transition">ポータルに戻る</a>
            </div>
        </div>

        <div id="status" class="rounded-3xl border border-orange-100 bg-orange-50 px-5 py-4 text-sm text-orange-900 mb-6 hidden"></div>

        <div class="flex justify-center mb-6">
            <a href="question-register.html" class="text-sm font-bold text-[#002a5c] underline underline-offset-4 hover:text-orange-600">登録ページを開く</a>
        </div>

        <div class="bg-white rounded-[2rem] shadow-lg border border-slate-100 p-6 mb-8">
            <div class="grid gap-4 lg:grid-cols-2">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">キーワード検索</label>
                    <input id="keywordInput" type="search" placeholder="質問タイトル・本文を検索..." class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-5 py-4 text-sm font-medium outline-none focus:border-orange-300 focus:ring-4 focus:ring-orange-100 transition" />
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">議員名検索</label>
                    <input id="memberInput" type="search" placeholder="議員名を入力..." class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-5 py-4 text-sm font-medium outline-none focus:border-orange-300 focus:ring-4 focus:ring-orange-100 transition" />
                </div>
            </div>
            <div class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <div class="text-sm text-slate-500">ヒットした結果を下の一覧で確認できます。</div>
                <div class="flex gap-2 flex-wrap">
                    <button id="reloadButton" class="rounded-3xl bg-[#002a5c] px-5 py-3 text-white font-black text-sm hover:bg-slate-800 transition">最新データを読み込み</button>
                    <div id="countBadge" class="rounded-full bg-orange-50 text-orange-700 px-4 py-2 text-sm font-bold">0 件</div>
                </div>
            </div>
        </div>

        <div class="overflow-x-auto bg-white rounded-[2rem] shadow-lg border border-slate-100">
            <table class="min-w-full border-collapse text-left text-sm text-slate-600">
                <thead class="bg-slate-50 text-xs uppercase tracking-[0.2em] text-slate-500">
                    <tr>
                        <th class="px-4 py-4">日付</th>
                        <th class="px-4 py-4">議員名</th>
                        <th class="px-4 py-4">所属</th>
                        <th class="px-4 py-4">タイトル</th>
                        <th class="px-4 py-4">本文</th>
                    </tr>
                </thead>
                <tbody id="resultsBody" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>

        <div id="emptyMessage" class="hidden rounded-[2rem] border border-slate-200 bg-slate-50 px-6 py-10 text-center text-slate-500 font-bold mt-6">一致するデータがありません。検索条件を変更してください。</div>
    </div>

    <script>
        const { SUPABASE_URL = "", SUPABASE_ANON_KEY = "" } = window.APP_CONFIG || {};
        const supabaseClient = SUPABASE_URL && SUPABASE_ANON_KEY ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        const statusEl = document.getElementById('status');
        const keywordInput = document.getElementById('keywordInput');
        const memberInput = document.getElementById('memberInput');
        const reloadButton = document.getElementById('reloadButton');
        const countBadge = document.getElementById('countBadge');
        const resultsBody = document.getElementById('resultsBody');
        const emptyMessageEl = document.getElementById('emptyMessage');

        let questions = [];

        function showStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.classList.toggle('hidden', false);
            statusEl.classList.toggle('bg-red-50', isError);
            statusEl.classList.toggle('border-red-100', isError);
            statusEl.classList.toggle('text-red-900', isError);
            statusEl.classList.toggle('bg-orange-50', !isError);
            statusEl.classList.toggle('border-orange-100', !isError);
            statusEl.classList.toggle('text-orange-900', !isError);
        }

        function hideStatus() {
            statusEl.classList.add('hidden');
        }

        function normalize(text) {
            return String(text || '').trim().toLowerCase();
        }

        function renderResults(list) {
            resultsBody.innerHTML = '';
            countBadge.textContent = `${list.length} 件`;
            if (list.length === 0) {
                emptyMessageEl.classList.remove('hidden');
                return;
            }
            emptyMessageEl.classList.add('hidden');

            list.forEach((q) => {
                const row = document.createElement('tr');
                row.className = 'odd:bg-slate-50';

                row.innerHTML = `
                    <td class="px-4 py-4 align-top text-xs text-slate-500">${q.date || ''}</td>
                    <td class="px-4 py-4 align-top font-bold text-slate-900">${q.member_name || '---'}</td>
                    <td class="px-4 py-4 align-top text-slate-600">${q.prefecture || ''} ${q.city || ''}</td>
                    <td class="px-4 py-4 align-top font-bold text-slate-900">${q.title || '（タイトルなし）'}</td>
                    <td class="px-4 py-4 align-top text-slate-600 whitespace-pre-wrap">${q.content || ''}</td>
                `;
                resultsBody.appendChild(row);
            });
        }

        function filterQuestions() {
            const keyword = normalize(keywordInput.value);
            const memberName = normalize(memberInput.value);

            return questions.filter((q) => {
                const title = normalize(q.title);
                const content = normalize(q.content);
                const member = normalize(q.member_name);

                const keywordMatch = keyword === '' || title.includes(keyword) || content.includes(keyword);
                const memberMatch = memberName === '' || member.includes(memberName);
                return keywordMatch && memberMatch;
            });
        }

        async function fetchQuestions() {
            if (!supabaseClient) {
                showStatus('Supabase の URL と anon key が未設定です。config.jsまたは.envに値を設定してください。', true);
                return;
            }

            showStatus('データを読み込み中です...');
            try {
                const { data, error } = await supabaseClient
                    .from('questions')
                    .select('*')
                    .order('date', { ascending: false });

                if (error) throw error;
                questions = data || [];
                hideStatus();
                renderResults(filterQuestions());
            } catch (err) {
                console.error(err);
                showStatus('データ取得中にエラーが発生しました。テーブル名または Supabase 設定を確認してください。', true);
                questions = [];
                renderResults([]);
            }
        }

        keywordInput.addEventListener('input', () => renderResults(filterQuestions()));
        memberInput.addEventListener('input', () => renderResults(filterQuestions()));
        reloadButton.addEventListener('click', async () => await fetchQuestions());

        fetchQuestions();
    </script>
</body>
</html>
